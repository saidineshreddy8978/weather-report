<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Weather</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container-fluid">
        <h1>Get Weather</h1>
        <input type="text" id="city" class="form-control mb-2" placeholder="Enter city name">
        <button id="btn" class="btn btn-primary">Get Weather</button>
        <div id="weatherDisplay">
            <img id="weatherIcon" src="" alt="Weather Icon" style="display: none;background-color:rgb(48, 48, 46) ">
            <h3 id="weatherReport"></h3>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
